<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Utils Test</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/engagement-mobile-responsive.css">
</head>
<body>
    <div class="container">
        <h1>Engagement Metrics Display Utilities Test</h1>
        
        <div class="test-section">
            <h2>Number Formatting Tests</h2>
            <div id="formatting-tests"></div>
        </div>
        
        <div class="test-section">
            <h2>Icon and Display Tests</h2>
            <div id="icon-tests"></div>
        </div>
        
        <div class="test-section">
            <h2>CSS Styling Tests</h2>
            <div id="styling-tests"></div>
        </div>
    </div>

    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/engagement.js"></script>
    <script>
        // Test number formatting
        const testCounts = [0, 5, 45, 123, 1200, 15000, 150000, 1500000, 15000000];
        const formattingDiv = document.getElementById('formatting-tests');
        
        testCounts.forEach(count => {
            const formatted = Formatters.formatEngagementNumber(count);
            formattingDiv.innerHTML += `<p>${count.toLocaleString()} → ${formatted}</p>`;
        });
        
        // Test icon and display functionality
        const iconDiv = document.getElementById('icon-tests');
        testCounts.forEach(count => {
            const display = EngagementUtils.formatEngagementDisplay(count);
            const level = EngagementUtils.getEngagementLevel(count);
            const badge = EngagementUtils.getEngagementBadge(count);
            const tooltip = EngagementUtils.getEngagementTooltip(count);
            
            iconDiv.innerHTML += `
                <div class="engagement-metric ${EngagementUtils.getEngagementClass(count)}" 
                     title="${tooltip}">
                    ${display} (${level}${badge ? ', ' + badge : ''})
                </div>
            `;
        });
        
        // Test CSS styling
        const stylingDiv = document.getElementById('styling-tests');
        stylingDiv.innerHTML = `
            <div class="model-card">
                <div class="model-engagement">
                    <div class="engagement-metric engagement-low">
                        <span class="engagement-icon">🤍</span>
                        <span class="engagement-count">5</span>
                    </div>
                    <div class="engagement-metric engagement-medium">
                        <span class="engagement-icon">❤️</span>
                        <span class="engagement-count">45</span>
                    </div>
                    <div class="engagement-metric engagement-high">
                        <span class="engagement-icon">❤️</span>
                        <span class="engagement-count">150</span>
                        <span class="engagement-badge badge-liked">Liked</span>
                    </div>
                    <div class="engagement-metric engagement-viral">
                        <span class="engagement-icon">❤️</span>
                        <span class="engagement-count">1.5K</span>
                        <span class="engagement-badge badge-popular">Popular</span>
                    </div>
                </div>
            </div>
        `;
    </script>
    
    <style>
        .test-section {
            margin: 2rem 0;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
        }
        
        .test-section h2 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        
        .engagement-metric {
            margin: 0.5rem 0;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            display: inline-block;
            margin-right: 1rem;
        }
    </style>
</body>
</html>
