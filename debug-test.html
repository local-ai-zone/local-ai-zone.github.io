<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGUF Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>GGUF Model Discovery - Debug Test</h1>
    <div id="status-container"></div>
    
    <script>
        const statusContainer = document.getElementById('status-container');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusContainer.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function addError(message, error) {
            const div = document.createElement('div');
            div.className = 'status error';
            div.innerHTML = `<strong>${message}</strong><br><pre>${error.stack || error.message || error}</pre>`;
            statusContainer.appendChild(div);
            console.error(message, error);
        }
        
        // Test 1: Check if basic files load
        addStatus('Starting debug tests...', 'info');
        
        // Test 2: Load and test utilities
        const script1 = document.createElement('script');
        script1.src = 'js/utils/helpers.js';
        script1.onload = () => {
            addStatus('✓ Helpers.js loaded successfully', 'success');
            
            // Test Helpers functionality
            if (typeof Helpers !== 'undefined') {
                addStatus('✓ Helpers class is available', 'success');
                
                // Test a helper function
                try {
                    const testResult = Helpers.formatDownloadCount ? 'available' : 'missing';
                    addStatus(`✓ Helpers methods: ${testResult}`, 'success');
                } catch (e) {
                    addError('✗ Error testing Helpers methods', e);
                }
            } else {
                addStatus('✗ Helpers class not found', 'error');
            }
        };
        script1.onerror = () => addStatus('✗ Failed to load helpers.js', 'error');
        document.head.appendChild(script1);
        
        // Test 3: Load formatters
        const script2 = document.createElement('script');
        script2.src = 'js/utils/formatters.js';
        script2.onload = () => {
            addStatus('✓ Formatters.js loaded successfully', 'success');
            
            if (typeof Formatters !== 'undefined') {
                addStatus('✓ Formatters class is available', 'success');
                
                // Test formatters
                try {
                    const testSize = Formatters.formatFileSize(1024 * 1024);
                    addStatus(`✓ Formatters test: ${testSize}`, 'success');
                } catch (e) {
                    addError('✗ Error testing Formatters', e);
                }
            } else {
                addStatus('✗ Formatters class not found', 'error');
            }
        };
        script2.onerror = () => addStatus('✗ Failed to load formatters.js', 'error');
        document.head.appendChild(script2);
        
        // Test 4: Load AppState
        const script3 = document.createElement('script');
        script3.src = 'js/state/AppState.js';
        script3.onload = () => {
            addStatus('✓ AppState.js loaded successfully', 'success');
            
            if (typeof AppState !== 'undefined') {
                addStatus('✓ AppState class is available', 'success');
                
                // Test AppState instantiation
                try {
                    const testState = new AppState();
                    const state = testState.getState();
                    addStatus(`✓ AppState test: ${Object.keys(state).length} state keys`, 'success');
                } catch (e) {
                    addError('✗ Error testing AppState', e);
                }
            } else {
                addStatus('✗ AppState class not found', 'error');
            }
        };
        script3.onerror = () => addStatus('✗ Failed to load AppState.js', 'error');
        document.head.appendChild(script3);
        
        // Test 5: Load DataService
        const script4 = document.createElement('script');
        script4.src = 'js/services/DataService.js';
        script4.onload = () => {
            addStatus('✓ DataService.js loaded successfully', 'success');
            
            if (typeof DataService !== 'undefined') {
                addStatus('✓ DataService class is available', 'success');
                
                // Test DataService
                try {
                    const testService = new DataService();
                    addStatus('✓ DataService instantiated successfully', 'success');
                    
                    // Test loading data
                    testService.loadModels('./gguf_models.json')
                        .then(models => {
                            addStatus(`✓ Data loaded: ${models.length} models`, 'success');
                            
                            // Show first model as example
                            if (models.length > 0) {
                                const firstModel = models[0];
                                addStatus(`✓ First model: ${firstModel.modelName}`, 'success');
                            }
                        })
                        .catch(error => {
                            addError('✗ Error loading data', error);
                        });
                } catch (e) {
                    addError('✗ Error testing DataService', e);
                }
            } else {
                addStatus('✗ DataService class not found', 'error');
            }
        };
        script4.onerror = () => addStatus('✗ Failed to load DataService.js', 'error');
        document.head.appendChild(script4);
        
        // Test 6: Test JSON data directly
        fetch('./gguf_models.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                addStatus(`✓ JSON data loaded directly: ${data.length} models`, 'success');
                
                if (data.length > 0) {
                    const sample = data[0];
                    const keys = Object.keys(sample);
                    addStatus(`✓ Sample model keys: ${keys.join(', ')}`, 'info');
                }
            })
            .catch(error => {
                addError('✗ Error loading JSON directly', error);
            });
        
        // Global error handler
        window.addEventListener('error', (event) => {
            addError('Global JavaScript Error', event.error);
        });
        
        // Test completion
        setTimeout(() => {
            addStatus('Debug tests completed. Check results above.', 'info');
        }, 2000);
    </script>
</body>
</html>
