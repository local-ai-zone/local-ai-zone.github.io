name: Update GGUF Models Data

on:
  schedule:
    # Run daily at 23:59 UTC
    - cron: '59 23 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours maximum
    
    permissions:
      contents: write  # Required to commit changes
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Fetch and process GGUF models data
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          echo "🚀 Starting GGUF models data update..."
          python scripts/simplified_gguf_fetcher.py
          
      - name: Verify generated files
        run: |
          echo "🔍 Verifying generated files..."
          
          if [ -f "data/gguf_models.json" ] && [ -f "gguf_models.json" ]; then
            MODELS_COUNT=$(jq -r 'length' data/gguf_models.json)
            echo "✅ Successfully generated $MODELS_COUNT model entries"
            echo "✅ Files copied to root directory for website access"
            
            # Create compatibility files for legacy validation scripts
            echo "🔄 Creating compatibility files..."
            cp gguf_models.json models.json
            
            # Create search index
            jq '[.[] | {id: .modelName, name: .modelName, type: .modelType, quant: .quantFormat, downloads: .downloadCount}]' gguf_models.json > search-index.json
            
            echo "✅ Created models.json and search-index.json for compatibility"
          else
            echo "❌ Required data files missing"
            exit 1
          fi
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add generated files
          git add data/ *.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "📝 No changes to commit - data is up to date"
          else
            # Get model count for commit message
            MODELS_COUNT=$(jq -r 'length' data/gguf_models.json)
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            
            git commit -m "🤖 Update GGUF models data - $TIMESTAMP

            📊 Updated with $MODELS_COUNT model entries
            🔄 Generated fresh data from Hugging Face
            📁 Files: data/gguf_models.json, gguf_models.json, models.json, search-index.json"
            
            git push
            echo "✅ Successfully pushed changes"
          fi