name: Update Social Media Banner

on:
  schedule:
    # Run daily at 6:00 AM UTC (after the daily model update)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggering
  push:
    paths:
      - 'gguf_models.json'
      - 'scripts/generate-banner.js'
      - 'social-banner.html'
      - 'css/social-banner.css'

jobs:
  update-banner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Validate required files
        run: |
          echo "🔍 Validating required files exist..."
          
          # Check for required scripts
          if [ ! -f "scripts/create-fallback-banner.js" ]; then
            echo "❌ Missing required script: scripts/create-fallback-banner.js"
            exit 1
          fi
          
          if [ ! -f "scripts/validate-banner-setup.js" ]; then
            echo "❌ Missing required script: scripts/validate-banner-setup.js"
            exit 1
          fi
          
          if [ ! -f "package.json" ]; then
            echo "❌ Missing package.json"
            exit 1
          fi
          
          echo "✅ All required files present"

      - name: Install Node.js dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          
          # Install with retry logic
          max_attempts=3
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            
            if npm ci --prefer-offline --no-audit; then
              echo "✅ Node.js dependencies installed successfully"
              break
            else
              echo "❌ npm ci failed on attempt $attempt"
              if [ $attempt -eq $max_attempts ]; then
                echo "All npm install attempts failed"
                exit 1
              else
                echo "Retrying in 10 seconds..."
                sleep 10
              fi
            fi
            
            attempt=$((attempt + 1))
          done
          
          # Verify critical dependencies
          echo "🔍 Verifying critical dependencies..."
          node -e "
            try {
              require('puppeteer');
              console.log('✅ Puppeteer available');
            } catch (error) {
              console.error('❌ Puppeteer not available:', error.message);
              process.exit(1);
            }
          "

      - name: Install system dependencies
        run: |
          echo "🖥️ Installing system dependencies for Puppeteer..."
          
          # Update package list with retry
          max_attempts=3
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Updating package list (attempt $attempt)"
            if sudo apt-get update; then
              break
            else
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Failed to update package list after $max_attempts attempts"
                exit 1
              fi
              sleep 5
            fi
            attempt=$((attempt + 1))
          done
          
          # Install system dependencies with error handling
          sudo apt-get install -y --no-install-recommends \
            gconf-service \
            libasound2 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgcc1 \
            libgconf-2-4 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            ca-certificates \
            fonts-liberation \
            libappindicator1 \
            libnss3 \
            lsb-release \
            xdg-utils \
            wget || {
              echo "❌ Failed to install some system dependencies"
              echo "ℹ️ Continuing anyway - some dependencies might not be critical"
            }
          
          echo "✅ System dependencies installation completed"

      - name: Generate social media banner
        run: |
          echo "🚀 Generating social media banner..."
          
          # Clean up any existing banner files to ensure fresh generation
          rm -f og-image.png og-image-fallback.png
          
          # Generate banner with timeout and error handling
          timeout 300 node scripts/create-fallback-banner.js || {
            echo "❌ Banner generation failed or timed out"
            
            # Check if we have existing banner files to use as fallback
            if git show HEAD:og-image-fallback.png > /dev/null 2>&1; then
              echo "🔄 Using previous version as fallback"
              git show HEAD:og-image-fallback.png > og-image-fallback.png
              git show HEAD:og-image.png > og-image.png
              echo "✅ Fallback banners restored"
            else
              echo "❌ No fallback available, banner generation completely failed"
              exit 1
            fi
          }
          
          # Verify banner was created
          if [ -f "og-image-fallback.png" ]; then
            echo "✅ Banner generated successfully"
            
            # Validate file size (should be reasonable for a PNG)
            file_size=$(stat -f%z og-image-fallback.png 2>/dev/null || stat -c%s og-image-fallback.png)
            if [ "$file_size" -lt 10000 ]; then
              echo "⚠️ Warning: Generated banner file seems too small ($file_size bytes)"
            elif [ "$file_size" -gt 2000000 ]; then
              echo "⚠️ Warning: Generated banner file is quite large ($file_size bytes)"
            fi
            
            ls -la og-image-fallback.png
            
            # Create both files as the same image (one image with two names)
            echo "📋 Creating og-image.png as copy of og-image-fallback.png"
            cp og-image-fallback.png og-image.png
            
            echo "✅ Both banner files created:"
            ls -la og-image*.png
          else
            echo "❌ Banner generation failed - no output file created"
            exit 1
          fi

      - name: Validate banner setup
        run: |
          echo "🔍 Validating banner setup..."
          
          # Run validation with timeout and error handling
          if timeout 60 node scripts/validate-banner-setup.js; then
            echo "✅ Banner validation passed"
          else
            echo "⚠️ Banner validation failed or timed out"
            echo "ℹ️ Continuing anyway - validation is not critical for deployment"
          fi

      - name: Check for changes
        id: changes
        run: |
          # Check if banner files have changed
          if git diff --quiet og-image.png og-image-fallback.png; then
            echo "No changes detected in banner files"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in banner files"
            echo "changed=true" >> $GITHUB_OUTPUT
            
            # Show file sizes for logging
            echo "📊 Banner file sizes:"
            ls -lh og-image*.png
          fi

      - name: Get current statistics
        id: stats
        run: |
          # Extract statistics from the models file
          MODEL_COUNT=$(node -e "
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('gguf_models.json', 'utf8'));
              const count = data.length;
              const formatted = count >= 1000 ? Math.floor(count / 1000) + 'K+' : count + '+';
              console.log(formatted);
            } catch (error) {
              console.log('40K+');
            }
          ")
          
          CURRENT_DATE=$(date +'%b %d, %Y')
          
          echo "model_count=$MODEL_COUNT" >> $GITHUB_OUTPUT
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          
          echo "📊 Current Statistics:"
          echo "   Models: $MODEL_COUNT"
          echo "   Date: $CURRENT_DATE"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add banner files
          git add og-image.png og-image-fallback.png
          
          # Create commit message with statistics
          COMMIT_MSG="🎨 Update social media banner - ${{ steps.stats.outputs.model_count }} models (${{ steps.stats.outputs.current_date }})"
          
          # Commit changes
          git commit -m "$COMMIT_MSG" || {
            echo "No changes to commit"
            exit 0
          }
          
          # Push changes
          git push origin main
          
          echo "✅ Banner updated and pushed to repository"

      - name: Create deployment comment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const stats = {
              modelCount: '${{ steps.stats.outputs.model_count }}',
              currentDate: '${{ steps.stats.outputs.current_date }}'
            };
            
            const comment = `🎨 **Social Media Banner Updated**
            
            The social media banner has been automatically updated with current statistics:
            
            - **Models**: ${stats.modelCount}
            - **Last Updated**: ${stats.currentDate}
            - **Banner Files**: Updated og-image.png and og-image-fallback.png (identical images)
            - **Dimensions**: 1200x630px
            
            The banner will now display current information when shared on social media platforms.
            
            _This update was performed automatically by the daily banner update workflow._`;
            
            // Only create comment if this was triggered by schedule or manual dispatch
            if (context.eventName === 'schedule' || context.eventName === 'workflow_dispatch') {
              github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: comment
              });
            }

      - name: Upload banner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-media-banners-${{ github.run_number }}
          path: |
            og-image.png
            og-image-fallback.png
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 🎨 Social Media Banner Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Statistics:**" >> $GITHUB_STEP_SUMMARY
          echo "- Models: ${{ steps.stats.outputs.model_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Date: ${{ steps.stats.outputs.current_date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "**Status:** ✅ Banner updated successfully" >> $GITHUB_STEP_SUMMARY
            echo "**Files Updated:**" >> $GITHUB_STEP_SUMMARY
            echo "- og-image.png (social media banner)" >> $GITHUB_STEP_SUMMARY
            echo "- og-image-fallback.png (identical copy)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ℹ️ No changes needed (banner is up to date)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Update:** Tomorrow at 6:00 AM UTC" >> $GITHUB_STEP_SUMMARY

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Social Media Banner Update Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Automation Failure: Social Media Banner Update
            
            **Failure Type**: Banner Generation
            **Timestamp**: ${new Date().toISOString()}
            **Workflow Run**: [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            ### Error Details
            The daily social media banner update workflow failed. This means the banner may not reflect current statistics.
            
            ### Affected Components
            - [x] Social media banner files (og-image.png, og-image-fallback.png)
            - [ ] Dependencies  
            - [ ] Scripts
            - [ ] System packages
            
            ### Recommended Actions
            1. Check the workflow logs for specific error messages
            2. Verify the create-fallback-banner.js script is working correctly
            3. Ensure all system dependencies are available
            4. Check if Puppeteer can launch properly in the CI environment
            
            ### Next Steps
            - Review and fix any issues with the banner generation script
            - Re-run the workflow manually once issues are resolved
            - Consider updating dependency installation if needed
            
            ### Impact
            The website will continue to work normally, but social media previews may show outdated information until this is resolved.
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['automation', 'bug', 'banner-update']
            });

  # Optional: Test banner generation without committing
  test-banner:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies for testing..."
          
          # Install Node.js dependencies
          npm ci --prefer-offline --no-audit || {
            echo "❌ npm ci failed, trying npm install"
            npm install --prefer-offline --no-audit
          }
          
          # Install system dependencies (minimal for testing)
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gconf-service libasound2 libatk1.0-0 libc6 libcairo2 \
            libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 \
            libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 \
            libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 \
            libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 ca-certificates \
            fonts-liberation libappindicator1 libnss3 lsb-release \
            xdg-utils wget || echo "⚠️ Some system dependencies failed to install"

      - name: Test banner generation
        run: |
          echo "🧪 Testing banner generation..."
          node scripts/create-fallback-banner.js
          
          # Create both files as the same image for testing
          if [ -f "og-image-fallback.png" ]; then
            cp og-image-fallback.png og-image.png
            echo "✅ Test banner files created"
          fi
          
          echo "🔍 Testing banner validation..."
          node scripts/validate-banner-setup.js
          
          echo "✅ All banner tests passed"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-banners-${{ github.run_number }}
          path: |
            og-image.png
            og-image-fallback.png
          retention-days: 7
