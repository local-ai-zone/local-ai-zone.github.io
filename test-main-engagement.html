<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main App Engagement Statistics Test</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/filter-responsive-fix.css">
    <link rel="stylesheet" href="css/engagement-mobile-responsive.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .test-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            overflow-y: auto;
            z-index: 10000;
            font-size: 12px;
        }
        
        .test-controls {
            margin-bottom: 20px;
        }
        
        .test-controls button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .test-controls button:hover {
            background: #0056b3;
        }
        
        .test-results {
            font-family: monospace;
            font-size: 11px;
            line-height: 1.4;
        }
        
        .test-results div {
            margin-bottom: 5px;
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
    </style>
</head>
<body>
    <!-- Test overlay -->
    <div class="test-overlay">
        <h3>Engagement Stats Test</h3>
        <div class="test-controls">
            <button onclick="testEngagementStats()">Test Engagement Stats</button>
            <button onclick="testFilteredStats()">Test Filtered Stats</button>
            <button onclick="testZeroEngagement()">Test Zero Engagement</button>
            <button onclick="clearResults()">Clear Results</button>
        </div>
        <div class="test-results" id="test-results"></div>
    </div>

    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Loading screen -->
    <div id="loading-screen" class="loading-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--background-color); z-index: 9999; display: flex;">
        <div class="loading-spinner"></div>
        <div class="loading-message">Loading GGUF models...</div>
    </div>
    
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="header-title">GGUF Model Discovery</h1>
                    <div class="header-stats">
                        <span id="model-count" class="stat-item">Loading...</span>
                        <span id="total-likes" class="stat-item">--</span>
                        <span id="avg-likes" class="stat-item">--</span>
                        <span id="data-timestamp" class="freshness-indicator freshness-recent">
                            Loading data...
                        </span>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="header-search">
                        <input 
                            type="search" 
                            id="model-search" 
                            class="search-input" 
                            placeholder="Search models... (Ctrl+K)"
                            aria-label="Search models"
                            autocomplete="off"
                        >
                    </div>
                    
                    <div class="header-sort">
                        <select id="sort-select" class="filter-select" aria-label="Sort models">
                            <option value="downloadCount-desc">Most Downloaded</option>
                            <option value="downloadCount-asc">Least Downloaded</option>
                            <option value="likeCount-desc">Most Liked</option>
                            <option value="likeCount-asc">Least Liked</option>
                            <option value="modelName-asc">Name A-Z</option>
                            <option value="modelName-desc">Name Z-A</option>
                            <option value="fileSize-desc">Largest First</option>
                            <option value="fileSize-asc">Smallest First</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main content -->
    <main id="main-content" class="main-content">
        <div class="container">
            <!-- Search and Filter Section -->
            <section class="search-filter-section" aria-label="Search and filter controls">
                <div id="filter-controls">
                    <div class="filters-container">
                        <div class="filter-group">
                            <label for="quantization-filter" class="filter-label">Quantization</label>
                            <select id="quantization-filter" class="filter-select">
                                <option value="all">All Quantizations</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Model Grid -->
            <section class="model-grid-section" aria-label="Model results">
                <div id="model-grid" class="model-grid">
                    <!-- Models will be populated here -->
                </div>
            </section>
            
            <!-- Pagination -->
            <section class="pagination-section" aria-label="Pagination controls">
                <div id="pagination-container">
                    <!-- Pagination will be populated here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Load dependencies -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/engagement.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="js/state/AppState.js"></script>
    <script src="js/services/DataService.js"></script>
    <script src="js/services/FilterService.js"></script>
    <script src="js/components/ModelCard.js"></script>
    <script src="js/components/SearchFilter.js"></script>
    <script src="js/components/ModelGrid.js"></script>
    <script src="js/components/Pagination.js"></script>

    <script>
        // Test data with engagement metrics
        const testModels = [
            {
                modelName: "High Engagement Model",
                quantFormat: "Q4_K_M",
                fileSize: 4200000000,
                fileSizeFormatted: "4.2 GB",
                modelType: "LLM",
                license: "Apache-2.0",
                downloadCount: 150000,
                likeCount: 1250,
                huggingFaceLink: "https://huggingface.co/test/model1"
            },
            {
                modelName: "Medium Engagement Model",
                quantFormat: "Q4_K_M",
                fileSize: 2100000000,
                fileSizeFormatted: "2.1 GB",
                modelType: "LLM",
                license: "MIT",
                downloadCount: 75000,
                likeCount: 45,
                huggingFaceLink: "https://huggingface.co/test/model2"
            },
            {
                modelName: "Low Engagement Model",
                quantFormat: "Q8_0",
                fileSize: 8400000000,
                fileSizeFormatted: "8.4 GB",
                modelType: "LLM",
                license: "Apache-2.0",
                downloadCount: 25000,
                likeCount: 3,
                huggingFaceLink: "https://huggingface.co/test/model3"
            },
            {
                modelName: "No Engagement Model",
                quantFormat: "F16",
                fileSize: 1050000000,
                fileSizeFormatted: "1.05 GB",
                modelType: "Embedding",
                license: "MIT",
                downloadCount: 10000,
                likeCount: 0,
                huggingFaceLink: "https://huggingface.co/test/model4"
            }
        ];

        // Mock app instance for testing
        let mockApp = {
            appState: null,
            
            init() {
                this.appState = new AppState();
                this.appState.setModels(testModels, new Date().toISOString());
                this.setupHeaderUpdates();
                logResult('Mock app initialized', 'success');
            },
            
            setupHeaderUpdates() {
                this.appState.subscribe((newState) => {
                    this.updateHeaderDisplay(newState);
                }, ['allModels', 'filteredModels', 'lastUpdateTime']);
            },
            
            updateHeaderDisplay(state) {
                try {
                    // Update data timestamp
                    const timestampElement = document.getElementById('data-timestamp');
                    if (timestampElement && state.lastUpdateTime) {
                        const formattedTime = Formatters.formatTimestamp(state.lastUpdateTime);
                        timestampElement.textContent = `Last updated: ${formattedTime}`;
                    }
                    
                    // Update engagement statistics
                    this.updateEngagementStats(state);
                    
                } catch (error) {
                    logResult(`Error updating header: ${error.message}`, 'error');
                }
            },
            
            updateEngagementStats(state) {
                try {
                    const { allModels = [], filteredModels = [] } = state;
                    
                    // Calculate total likes
                    const allTotalLikes = allModels.reduce((sum, model) => sum + (model.likeCount || 0), 0);
                    const filteredTotalLikes = filteredModels.reduce((sum, model) => sum + (model.likeCount || 0), 0);
                    
                    // Update total likes display
                    const totalLikesElement = document.getElementById('total-likes');
                    if (totalLikesElement) {
                        if (filteredModels.length !== allModels.length) {
                            // Show filtered vs total
                            const formattedFiltered = Formatters.formatEngagementNumber(filteredTotalLikes);
                            const formattedTotal = Formatters.formatEngagementNumber(allTotalLikes);
                            totalLikesElement.textContent = `❤️ ${formattedFiltered} of ${formattedTotal} likes`;
                            totalLikesElement.title = `${filteredTotalLikes.toLocaleString()} likes in filtered results of ${allTotalLikes.toLocaleString()} total likes`;
                        } else {
                            // Show total only
                            const formatted = Formatters.formatEngagementNumber(allTotalLikes);
                            totalLikesElement.textContent = `❤️ ${formatted} total likes`;
                            totalLikesElement.title = `${allTotalLikes.toLocaleString()} total likes across all models`;
                        }
                    }
                    
                    // Calculate and update average likes
                    const modelsToUse = filteredModels.length !== allModels.length ? filteredModels : allModels;
                    const avgLikes = modelsToUse.length > 0 ? filteredTotalLikes / modelsToUse.length : 0;
                    
                    const avgLikesElement = document.getElementById('avg-likes');
                    if (avgLikesElement) {
                        const formatted = Formatters.formatEngagementNumber(Math.round(avgLikes));
                        avgLikesElement.textContent = `Avg: ${formatted} likes`;
                        avgLikesElement.title = `Average ${avgLikes.toFixed(1)} likes per model`;
                    }
                    
                    // Update model count with engagement context
                    const modelCountElement = document.getElementById('model-count');
                    if (modelCountElement) {
                        const modelsWithLikes = allModels.filter(model => (model.likeCount || 0) > 0).length;
                        
                        if (filteredModels.length !== allModels.length) {
                            const filteredWithLikes = filteredModels.filter(model => (model.likeCount || 0) > 0).length;
                            modelCountElement.textContent = `${filteredModels.length} of ${allModels.length} models`;
                            modelCountElement.title = `${filteredWithLikes} models with likes in filtered results, ${modelsWithLikes} total with likes`;
                        } else {
                            modelCountElement.textContent = `${allModels.length} models`;
                            modelCountElement.title = `${modelsWithLikes} models have engagement data`;
                        }
                    }
                    
                } catch (error) {
                    logResult(`Error updating engagement stats: ${error.message}`, 'error');
                }
            }
        };

        function logResult(message, type = 'info') {
            const resultsDiv = document.getElementById('test-results');
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${timestamp}] ${message}`;
            resultsDiv.appendChild(div);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        function testEngagementStats() {
            logResult('Testing engagement statistics...', 'info');
            
            // Check if elements exist
            const totalLikes = document.getElementById('total-likes');
            const avgLikes = document.getElementById('avg-likes');
            const modelCount = document.getElementById('model-count');
            
            if (!totalLikes || !avgLikes || !modelCount) {
                logResult('Missing engagement stat elements', 'error');
                return;
            }
            
            // Trigger state update
            mockApp.appState.updateState({
                allModels: testModels,
                filteredModels: testModels
            });
            
            setTimeout(() => {
                logResult(`Total likes: ${totalLikes.textContent}`, 'success');
                logResult(`Avg likes: ${avgLikes.textContent}`, 'success');
                logResult(`Model count: ${modelCount.textContent}`, 'success');
            }, 100);
        }

        function testFilteredStats() {
            logResult('Testing filtered engagement statistics...', 'info');
            
            // Filter to high engagement models only
            const filtered = testModels.filter(model => model.likeCount > 100);
            
            mockApp.appState.updateState({
                filteredModels: filtered
            });
            
            setTimeout(() => {
                const totalLikes = document.getElementById('total-likes');
                const avgLikes = document.getElementById('avg-likes');
                const modelCount = document.getElementById('model-count');
                
                logResult(`Filtered total likes: ${totalLikes.textContent}`, 'success');
                logResult(`Filtered avg likes: ${avgLikes.textContent}`, 'success');
                logResult(`Filtered model count: ${modelCount.textContent}`, 'success');
            }, 100);
        }

        function testZeroEngagement() {
            logResult('Testing zero engagement handling...', 'info');
            
            const zeroModels = testModels.map(model => ({
                ...model,
                likeCount: 0
            }));
            
            mockApp.appState.updateState({
                allModels: zeroModels,
                filteredModels: zeroModels
            });
            
            setTimeout(() => {
                const totalLikes = document.getElementById('total-likes');
                const avgLikes = document.getElementById('avg-likes');
                
                logResult(`Zero engagement total: ${totalLikes.textContent}`, 'success');
                logResult(`Zero engagement avg: ${avgLikes.textContent}`, 'success');
            }, 100);
        }

        function clearResults() {
            document.getElementById('test-results').innerHTML = '';
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Hide loading screen
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }
            
            // Initialize mock app
            mockApp.init();
            
            logResult('Test page loaded successfully', 'success');
        });
    </script>
</body>
</html>
